name: KineticVelocityWatch
options:
  bundleIdPrefix: com.lichaochen.kineticvelocity
  deploymentTarget:
    watchOS: "11.0"
settings:
  base:
    MARKETING_VERSION: 1.0
    CURRENT_PROJECT_VERSION: 1
    SWIFT_VERSION: 5.9
    CODE_SIGN_STYLE: Automatic
targets:
  KineticVelocityWatch:
    type: application
    platform: watchOS
    deploymentTarget: "11.0"
    sources:
      - path: KineticVelocityWatch
        excludes:
          - swing_calibration.json
      - path: KineticVelocityWatch/swing_calibration.json
        buildPhase: resources
    info:
      path: KineticVelocityWatch/Info.plist
      properties:
        WKApplication: true
        WKWatchOnly: true
        CFBundleDisplayName: Kinetic Velocity
        NSHealthShareUsageDescription: Kinetic Velocity reads heart rate and active energy during badminton workouts.
        NSHealthUpdateUsageDescription: Kinetic Velocity saves badminton workout sessions to Health.
        NSMotionUsageDescription: Kinetic Velocity uses wrist motion to count and classify badminton swings.
        WKBackgroundModes:
          - workout-processing
    entitlements:
      path: KineticVelocityWatch/KineticVelocityWatch.entitlements
      properties:
        com.apple.developer.healthkit: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lichaochen.kineticvelocity.watch
        ENABLE_PREVIEWS: true
